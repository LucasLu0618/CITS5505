<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - KidCode Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <div class="logo">
      <a href="index.html">KidCode Hub</a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="showcase.html">Showcase</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <!-- Register Section -->
  <main class="login-page">
    <section class="login-section">
      <div class="login-card">
        <h1 class="gradient-text">Create Account</h1>
        <p class="login-subtitle">Join us and start your coding journey!</p>

        <form class="login-form" action="#" method="post">

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password">
          </div>

          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" placeholder="Confirm your password">
          </div>

          <button type="submit" class="btn btn-green login-btn">Register</button>
        </form>

        <p class="register-link">
          Already have an account?
          <a href="login.html">Login here</a>
        </p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>2026 KidCode Hub. Designed by Lucas, Sagar and Shee.</p>
  </footer>

</body>
</html>
