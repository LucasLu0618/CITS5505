<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - KidCode Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <div class="logo">
      <a href="index.html">KidCode Hub</a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="showcase.html">Showcase</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <main class="login-page">
      <div class="login-card">
        <h1 class="gradient-text">Welcome Back</h1>
        <p class="login-subtitle">Log in to continue your coding journey.</p>

        <form class="login-form" action="#" method="post">
          <div class="form-group">
            <label for="email">Email or Username</label>
            <input type="text" id="email" name="email" placeholder="Enter your email or username">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember">
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-pink login-btn">Login</button>
        </form>

        <p class="register-link">
          Don’t have an account?
          <a href="register.html">Register here</a>
        </p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>2026 KidCode Hub. Designed by Lucas, Sagar and Shee.</p>
  </footer>

</body>
</html>
